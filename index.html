<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>國立科技高中─校園社團介紹網</title>
    <style>
        #main {
            width: 1024px;
            height: 768px;
            margin: 0 auto;
            /* background: burlywood; */
            border: 10px solid #4d4d4d;
            background: #FF00FF;
        }

        #top {
            /*標頭*/
            width: 1000px;
            height: 60px;
            margin: 0 auto;
            /* background: palegoldenrod; */
        }

        #left {
            width: 215px;
            height: calc(768px - 65px - 20px);
            float: left;
            margin-left: 12px;
            /* background: palegreen; */
        }

        #menu {
            width: 215px;
            height: calc(768px - 65px - 20px - 25px);
            /* background: #eee; */

            div {
                font-size: 24px;
                text-align: center;
                font-family: '標楷體';
                font-weight: 500;
                text-decoration: underline;
                color: #FF00FF;
            }

            td {
                width: 215px;
                height: 35px;
                font-size: 16px;
                text-align: center;
                font-family: '標楷體';
                line-height: 35px;
                color: #000000;
                display: block;
                background: url("./images/menu1.png") no-repeat center;
            }

            td a:hover {
                background: url("./images/menu2.png") no-repeat center;
                display: block;
            }

        }

        #right {
            width: 770px;
            height: calc(768px - 65px - 20px);
            float: right;
            margin-right: 12px;
            /* background: pink; */
        }

        marquee {
            /*跑馬燈*/
            width: 770px;
            height: 29px;
            line-height: 29px;
            font-size: 24px;
            font-family: '標楷體';
            color: #0000FF;
            /* background: #eee; */
        }

        iframe {
            width: 770px;
            height: calc(768px - 65px - 20px - 29px);
            /* background: #FF00FF; */
        }

        #update {
            font-family: '標楷體';
            color: #000;
            text-align: center;
            line-height: 25px;
            font-size: 16px;
            /* background: #FF00FF; */
        }

        #footer {
            /*版權*/
            width: 1000px;
            height: 20px;
            margin: 0 auto;
            clear: both;
            /*清除*/
            font-size: 16px;
            font-family: '標楷體';
            color: #000;
            text-align: center;
            line-height: 20px;
            /* background: #fff; */
        }
    </style>
</head>

<body>
    <div id="main">
        <div id="top"><a href="./index.html"><img src="images/logo.png" alt="國立科技高中校園社團介紹網" title="國立科技高中校園社團介紹網"></a>

                    </tr>
                    <tr>

                    </tr>
                    <tr>

                    <tr>

                    <tr>

            <iframe src="main.html" frameborder="0" name="iframe"></iframe>

        <div id="footer">網頁設計及維護：楊麗蓉</div>

</html>
